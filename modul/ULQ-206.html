                    <h3 class="text-xl font-bold text-emerald-800 mb-2">1. Definisi & Hakikat</h3>
                    <p class="mb-4 text-slate-700 leading-relaxed">Asbabun Nuzul adalah peristiwa atau pertanyaan yang melatarbelakangi turunnya satu atau beberapa ayat sebagai jawaban atau penjelasan atas kejadian tersebut. Imam Az-Zarkasyi menekankan bahwa pengetahuan ini membantu menghindari keraguan dalam penafsiran.</p>

                            <p class="italic text-sm text-slate-600 font-bold">Analogi Komunikasi:</p>
                            <p class="text-sm">Menafsirkan ayat tanpa Asbabun Nuzul seperti membaca balasan chat "Oke, lakukan saja" tanpa tahu pertanyaan sebelumnya. Tanpa konteks, kita tidak tahu apakah itu izin, perintah, atau sindiran.</p>

                    </div>

                        <li><strong>Membatasi Makna:</strong> Mengkhususkan hukum bagi mereka yang tahu konteksnya agar tidak salah diterapkan secara umum yang serampangan.</li>

                content: `

                    <p class="text-sm mb-4 text-slate-700">Lafadz yang mencakup segala apa yang pantas baginya dalam satu kata (Kulli). Contoh: "Man" (Barangsiapa) mencakup laki-laki, perempuan, kaya, miskin.</p>
                    <h3 class="text-xl font-bold text-emerald-800 mb-2">2. Perangkat 'Am (Sighat)</h3>
                    <ul class="list-disc ml-6 space-y-2 text-slate-700">
                        <li>Kata <strong>Kullun</strong> (Setiap/Semua).</li>
                        <li>Isim Ma'rifah dengan <strong>Alif Lam (Al)</strong> Istighraq.</li>
                        <li>Isim Nakirah dalam konteks Nafyu (Peniadaan). Contoh: "Laa Ilaaha" (Tidak ada tuhan manapun).</li>
                        <li>Kata ganti penghubung (Isim Maushul) seperti <strong>Alladzina</strong>.</li>
                    </ul>
                `,
                quiz: [
                    { q: "Apa arti Al-'Am secara istilah?", a: ["Terbatas", "Menyeluruh/Umum", "Satu saja", "Palsu"], c: 1 },
                    { q: "Kata 'Kullu' (Setiap) menunjukkan makna...", a: ["Khash", "Umum", "Ragu", "Sebagian"], c: 1 },
                    { q: "Isim Maushul 'Alladzina' mencakup...", a: ["Satu orang", "Hanya wanita", "Kelompok umum (Mereka yang...)", "Tidak ada"], c: 2 },
                    { q: "Kalimat 'Laa rajula fid-dari' (Tak ada pria di rumah) bermakna...", a: ["Ada satu pria", "Umum meniadakan semua pria", "Pria itu tidur", "Rumah kosong"], c: 1 },
                    { q: "Hukum asal lafadz 'Am dalam Al-Qur'an adalah...", a: ["Boleh diabaikan", "Wajib diamalkan secara umum selama tak ada dalil khusus", "Harus dihapus", "Hanya untuk sahabat"], c: 1 },
                    { q: "Mana contoh lafadz 'Am?", a: ["Zaid", "Man (Barangsiapa)", "Makkah", "Muhammad"], c: 1 },
                    { q: "Alif Lam pada kata 'Al-Insan' dalam surat Al-Ashr bermakna...", a: ["Semua manusia", "Manusia tertentu", "Nabi", "Orang kafir saja"], c: 0 },
                    { q: "Lafadz 'Am yang dimaksudkan khusus disebut...", a: ["'Am makhshush", "Khash murni", "Mutlaq", "Muqayyad"], c: 0 },
                    { q: "Mengapa kita harus belajar ilmu 'Am?", a: ["Biar keren", "Agar tidak salah menggeneralisir hukum", "Menambah beban", "Lupa"], c: 1 },
                    { q: "Lawan dari 'Am adalah...", a: ["Kulli", "Khash", "Jami'", "Mutawatir"], c: 1 }
                ]
            },
            8: {
                title: "Lafadz Khash & Takhshish",
                objective: "Santri memahami pembatasan hukum umum menjadi khusus.",
                content: `
                    <h3 class="text-xl font-bold text-emerald-800 mb-2">1. Definisi Khash</h3>
                    <p class="text-sm mb-4 text-slate-700">Lafadz yang hanya mencakup satu satuan tertentu atau beberapa satuan yang terbatas. Contoh: Nama orang, angka, atau kata benda tertentu.</p>
                    <h3 class="text-xl font-bold text-emerald-800 mb-2">2. Al-Mukhasshish (Pengecualian)</h3>
                    <p class="text-sm mb-2 font-bold">Terbagi dua:</p>
                    <ul class="list-disc ml-6 space-y-2 text-slate-700">
                        <li><strong>Muttashil (Menyatu):</strong> Seperti pengecualian dengan kata "Illa" (Kecuali).</li>
                        <li><strong>Munfashil (Terpisah):</strong> Hukum umum di satu ayat dikhususkan oleh ayat lain atau hadits Nabi ﷺ.</li>
                    </ul>
                `,
                quiz: [
                    { q: "Apa itu Takhshish?", a: ["Menghapus hukum", "Mengeluarkan sebagian satuan dari lafadz umum", "Membuat hukum baru", "Membaca cepat"], c: 1 },
                    { q: "Lafadz 'Illa' (Kecuali) adalah alat untuk...", a: ["Penyambung", "Takhshish (Pengecualian)", "Pertanyaan", "Hinaan"], c: 1 },
                    { q: "Mukhasshish Munfashil artinya dalil pengecualinya...", a: ["Menyatu satu kalimat", "Terpisah di ayat/hadits lain", "Tidak ada", "Karangan"], c: 1 },
                    { q: "Siapa yang berhak melakukan takhshish?", a: ["Semua orang", "Allah dan Rasul-Nya (melalui dalil)", "Presiden", "Pelajar"], c: 1 },
                    { q: "Angka 'Tiga' (Tsalatsah) termasuk lafadz...", a: ["'Am", "Khash", "Mutlaq", "Mujmal"], c: 1 },
                    { q: "Mukhasshish Muttashil contohnya adalah 'Sifat', maksudnya...", a: ["Orang yang baik (mengkhususkan orang)", "Nama hewan", "Warna baju", "Besar kecil"], c: 0 },
                    { q: "Hadits Nabi bisa mengkhususkan keumuman ayat Al-Qur'an?", a: ["Tidak bisa", "Bisa", "Haram", "Syaratnya sulit"], c: 1 },
                    { q: "Jika ada ayat 'Diharamkan bangkai', lalu hadits bilang 'Bangkai ikan halal', ini adalah...", a: ["Pembatalan", "Takhshish", "Kekeliruan", "Cerita"], c: 1 },
                    { q: "Fungsi Takhshish adalah agar hukum menjadi lebih...", a: ["Berat", "Proporsional dan tepat sasaran", "Banyak", "Hilang"], c: 1 },
                    { q: "Akal dan perasaan bisa jadi mukhasshish?", a: ["Ya", "Tidak (harus dalil syar'i)", "Kadang-kadang", "Tergantung guru"], c: 1 }
                ]
            },
            9: {
                title: "Tes Sumatif ULQ-206",
                objective: "Evaluasi Akhir Semester untuk seluruh materi 1-8.",
                content: `<div class="text-center py-10 bg-emerald-50 rounded-2xl border-2 border-emerald-200">
                    <h2 class="text-3xl font-black text-emerald-900 mb-4">Ujian Komprehensif</h2>
                    <p class="mb-6">Siapkan mental dan hafalan Anda. 20 Soal acak menanti.</p>
                    <button onclick="startSumatif()" class="px-10 py-4 bg-emerald-600 text-white rounded-full font-bold shadow-lg hover:bg-emerald-700 transition-all scale-110">Mulai Ujian Sekarang</button>
                </div>`,
                quiz: [] // Akan diisi secara acak dari database di atas
            }
        };

        function showTab(id) {
            const area = document.getElementById('content-area');
            const data = moduleData[id];
            
            // Update Navigation UI
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-btn-active'));
            document.getElementById('nav-' + id).classList.add('nav-btn-active');

            // Render Content
            if (id === 9) {
                area.innerHTML = `
                    <div class="bg-white p-8 rounded-2xl shadow-xl">
                        <h2 class="text-3xl font-black text-slate-800 mb-2">${data.title}</h2>
                        <hr class="mb-6">
                        ${data.content}
                        <div id="sumatif-quiz-area" class="mt-8 space-y-6"></div>
                    </div>
                `;
            } else {
                area.innerHTML = `
                    <div class="bg-white p-8 rounded-2xl shadow-xl border-t-8 border-emerald-600 transition-all animate-in fade-in duration-500">
                        <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold mb-4 inline-block">Pertemuan ${id}</span>
                        <h2 class="text-4xl font-black text-slate-800 mb-4">${data.title}</h2>
                        <div class="p-4 bg-slate-50 border-l-4 border-slate-300 mb-8 italic text-slate-600 text-sm">
                            Target: ${data.objective}
                        </div>
                        <div class="prose max-w-none text-slate-700 mb-12">
                            ${data.content}
                        </div>
                        
                        <div class="mt-12 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                            <h3 class="text-2xl font-bold text-slate-800 mb-6 flex items-center">
                                <svg class="w-6 h-6 mr-2 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path d="M17.414 2.586a2 2 0 00-2.828 0L7 10.172V13h2.828l7.586-7.586a2 2 0 000-2.828z"></path><path fill-rule="evenodd" d="M2 6a2 2 0 012-2h4a1 1 0 010 2H4v10h10v-4a1 1 0 112 0v4a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clip-rule="evenodd"></path></svg>
                                Latihan Formatif P-${id}
                            </h3>
                            <div class="space-y-8">
                                ${data.quiz.map((q, i) => renderQuizItem(id, i, q)).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function renderQuizItem(pId, qId, data) {
            return `
                <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm">
                    <p class="font-bold text-slate-800 mb-4">${qId + 1}. ${data.q}</p>
                    <div class="grid md:grid-cols-2 gap-3">
                        ${data.a.map((opt, i) => `
                            <button onclick="check(this, ${i}, ${data.c})" class="quiz-option text-left p-3 rounded-lg text-sm font-medium text-slate-600">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function check(btn, selected, correct) {
            const container = btn.parentElement;
            const buttons = container.querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);
            
            if (selected === correct) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
                buttons[correct].classList.add('correct');
            }
        }

        function startSumatif() {
            const container = document.getElementById('sumatif-quiz-area');
            container.innerHTML = "";
            let pool = [];
            for (let i=1; i<=8; i++) {
                pool.push(...moduleData[i].quiz.map(q => ({...q, source: i})));
            }
            // Shuffle and pick 20
            const selected = pool.sort(() => 0.5 - Math.random()).slice(0, 20);
            
            selected.forEach((q, i) => {
                const qDiv = document.createElement('div');
                qDiv.className = "p-6 bg-slate-50 rounded-xl border border-slate-200";
                qDiv.innerHTML = `
                    <div class="flex justify-between mb-2">
                        <span class="text-xs font-bold text-slate-400">SOAL ${i+1}</span>
                        <span class="text-[10px] uppercase text-emerald-500 font-bold">Materi P-${q.source}</span>
                    </div>
                    <p class="font-bold mb-4">${q.q}</p>
                    <div class="grid gap-2">
                        ${q.a.map((opt, idx) => `
                            <button onclick="check(this, ${idx}, ${q.c})" class="quiz-option text-left p-3 bg-white rounded-lg text-sm">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        // Initialize
        window.onload = () => showTab(1);
    </script>
</body>
