                                            <button onclick="checkAnswer(${id}, ${idx}, ${oIdx})" id="q-${id}-${idx}-${oIdx}" class="text-left text-xs p-3 border-2 border-gray-200 rounded-lg font-medium hover:border-emerald-500 hover:bg-white transition bg-white">
                                                ${opt}
                                            </button>
                                        `).join('')}
                                    </div>
                                    <div id="expl-${id}-${idx}" class="mt-4 hidden p-4 bg-emerald-900 text-white rounded-lg text-[10px] leading-relaxed animate-slideUp">
                                        <span class="font-bold block mb-1">KUNCI & PEMBAHASAN:</span>
                                        ${q.e}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            if (window.MathJax) MathJax.typeset();
        }

        function checkAnswer(mId, qIdx, oIdx) {
            const q = meetingsData[mId].questions[qIdx];
            const correct = q.c;
            const expl = document.getElementById(`expl-${mId}-${qIdx}`);
            expl.classList.remove('hidden');
            
            const btns = document.querySelectorAll(`[id^="q-${mId}-${qIdx}-"]`);
            btns.forEach((btn, idx) => {
                btn.disabled = true;
                if(idx === correct) btn.classList.add('border-green-500', 'bg-green-50', 'text-green-700');
                else if(idx === oIdx) btn.classList.add('border-red-500', 'bg-red-50', 'text-red-700');
            });
        }

        window.onload = () => switchTab(1);
    </script>
</body>
</html>
