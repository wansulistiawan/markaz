                    "Analisis Konten (20'): Melihat contoh postingan (teks Arab) dan mengkritik isinya secara santun.",
                    "Kampanye Digital (20'): Membuat poster ajakan kebaikan dalam bahasa Arab untuk diunggah di medsos fiktif.",
                    "Closing (10'): Komitmen bersama untuk menjaga pandangan dan jempol di dunia maya."
                ],
                quiz: [
                    { q: "Apa bahasa Arab 'Internet'?", a: ["الإنترنت", "الهاتف", "التلفاز", "الراديو"], c: 0 },
                    { q: "'وسائل التواصل الاجتماعي' artinya...", a: ["Alat transportasi", "Media sosial", "Alat masak", "Peralatan sekolah"], c: 1 },
                    { q: "Ghozul Fikri (غزو الفكر) berarti...", a: ["Perang fisik", "Perang pemikiran", "Perang ekonomi", "Perang bintang"], c: 1 },
                    { q: "Pendapat dalam bahasa Arab adalah...", a: ["الرأي", "الاسم", "العمر", "البيت"], c: 0 },
                    { q: "'Fi ro-yi' artinya...", a: ["Menurut pendapatku", "Menurut guruku", "Menurut ayahku", "Menurut temanku"], c: 0 },
                    { q: "Apa arti 'الفتنة'?", a: ["Damai", "Fitnah/Ujian", "Kebaikan", "Kemajuan"], c: 1 },
                    { q: "Kita harus menggunakan teknologi untuk...", a: ["الخير", "الشر", "اللعب", "النوم"], c: 0 },
                    { q: "Bahasa Arab 'Telepon Genggam'...", a: ["الهاتف المحمول", "الحاسوب", "المذياع", "الساعة"], c: 0 },
                    { q: "Berita bohong disebut...", a: ["خبر كاذب", "خبر صادق", "خبر طويل", "خبر قصير"], c: 0 },
                    { q: "Tujuan belajar bahasa Arab adalah memahami...", a: ["القرآن", "المجلة", "الأغنية", "الفيلم"], c: 0 }
                ]
            }
        };

        function switchTab(id) {
            const data = moduleData[id];
            const container = document.getElementById('content-container');
            
            // UI State
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('btn-' + id).classList.add('tab-active');

            // Render Content
            container.innerHTML = `
                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200 animate-fadeIn">
                    <div class="bg-blue-600 p-8 text-white">
                        <h2 class="text-3xl font-black mb-2 uppercase italic">${data.title}</h2>
                        <p class="text-blue-100 font-semibold opacity-90">Modul Pembelajaran Interaktif ARB-206</p>
                    </div>
                    
                    <div class="p-6 md:p-10 space-y-12">
                        <!-- Bagian A -->
                        <section>
                            <h3 class="flex items-center text-2xl font-bold text-blue-900 mb-4">
                                <span class="bg-blue-100 text-blue-600 w-10 h-10 flex items-center justify-center rounded-full mr-3 text-lg">A</span>
                                Tujuan Pembelajaran Spesifik
                            </h3>
                            <div class="bg-slate-50 p-6 rounded-2xl border-l-8 border-blue-500 shadow-sm">
                                <p class="text-slate-700 leading-relaxed text-lg">${data.a}</p>
                            </div>
                        </section>

                        <!-- Bagian B -->
                        <section>
                            <h3 class="flex items-center text-2xl font-bold text-emerald-900 mb-4">
                                <span class="bg-emerald-100 text-emerald-600 w-10 h-10 flex items-center justify-center rounded-full mr-3 text-lg">B</span>
                                Internalisasi Nilai Islam & Adab
                            </h3>
                            <div class="bg-emerald-50 p-6 rounded-2xl border-l-8 border-emerald-500 shadow-sm">
                                <p class="text-emerald-900 font-medium leading-relaxed">${data.b}</p>
                            </div>
                        </section>

                        <!-- Bagian C -->
                        <section>
                            <h3 class="flex items-center text-2xl font-bold text-orange-900 mb-4">
                                <span class="bg-orange-100 text-orange-600 w-10 h-10 flex items-center justify-center rounded-full mr-3 text-lg">C</span>
                                Skenario Pembelajaran (Alur 90 Menit)
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                ${data.c.map(step => `
                                    <div class="flex items-start p-4 bg-orange-50 rounded-xl border border-orange-100">
                                        <div class="bg-orange-500 text-white p-1 rounded mr-3 mt-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                                        </div>
                                        <p class="text-orange-900 font-semibold text-sm">${step}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </section>

                        <!-- Quiz Section -->
                        <section class="pt-10 border-t border-slate-100">
                            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                                <h3 class="text-3xl font-black text-slate-800 tracking-tight">KUIS FORMATIF <span class="text-blue-600">10 SOAL</span></h3>
                                <div id="score-badge-${id}" class="bg-blue-900 text-white px-6 py-2 rounded-full font-bold shadow-lg hidden">Skor: 0/10</div>
                            </div>
                            
                            <div class="space-y-4">
                                ${data.quiz.map((q, idx) => `
                                    <div class="p-6 bg-white rounded-2xl border-2 border-slate-100 hover:border-blue-200 transition-all">
                                        <div class="flex items-center mb-4">
                                            <span class="bg-slate-200 text-slate-700 px-3 py-1 rounded-md text-sm font-bold mr-3">${idx+1}</span>
                                            <p class="font-bold text-slate-800 text-lg">${q.q}</p>
                                        </div>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            ${q.a.map((opt, oidx) => `
                                                <button onclick="handleAnswer(this, ${idx}, ${oidx}, '${id}')" 
                                                        class="quiz-opt text-left p-4 rounded-xl border-2 border-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-all font-medium text-slate-700">
                                                    ${opt}
                                                </button>
                                            `).join('')}
                                        </div>
                                        <div id="msg-${id}-${idx}" class="mt-4 hidden animate-bounce"></div>
                                    </div>
                                `).join('')}
                            </div>
                        </section>
                    </div>
                </div>
            `;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        let totalScores = {};

        function handleAnswer(btn, qidx, choice, pid) {
            const data = moduleData[pid].quiz[qidx];
            const msg = document.getElementById(`msg-${pid}-${qidx}`);
            const parent = btn.parentElement;
            
            // Disable all options
            parent.querySelectorAll('button').forEach(b => {
                b.disabled = true;
                b.classList.add('opacity-50');
            });

            btn.classList.remove('opacity-50');

            if (choice === data.c) {
                btn.classList.add('correct-answer');
                msg.innerHTML = `<span class="text-green-600 font-bold flex items-center"><svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg> Mumtaz! Jawaban Benar</span>`;
                if(!totalScores[pid]) totalScores[pid] = 0;
                totalScores[pid]++;
            } else {
                btn.classList.add('wrong-answer');
                parent.querySelectorAll('button')[data.c].classList.add('correct-answer');
                parent.querySelectorAll('button')[data.c].classList.remove('opacity-50');
                msg.innerHTML = `<span class="text-red-600 font-bold flex items-center"><svg class="w-5 h-5 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg> Afwan, belum tepat</span>`;
            }
            msg.classList.remove('hidden');

            // Update badge
            const badge = document.getElementById(`score-badge-${pid}`);
            badge.innerText = `Skor: ${totalScores[pid] || 0}/10`;
            badge.classList.remove('hidden');
        }

        window.onload = () => switchTab('p1');
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
    </style>

</body>
</html>
