                    { q: "Fi'il Nahi dari 'Kamu menulis' (Taktubu) adalah...", options: ["Laa Taktubu", "Laa Taktuba", "Laa Taktub", "Ma Taktub"], correct: 2, exp: "Laa + Taktub (sukun)." },
                    { q: "Jika fi'il mudhari' tetap dhommah setelah 'Laa', maka 'Laa' itu bermakna...", options: ["Jangan", "Tidak", "Harus", "Mungkin"], correct: 1, exp: "Itu adalah Laa Nafiyah (Peniadaan) yang tidak mengubah harakat." },
                    { q: "Fi'il Nahi dari يَذْهَبُ (untuk kamu) adalah...", options: ["لاَ يَذْهَبْ", "لاَ تَذْهَبْ", "لاَ تَذْهَبُ", "لاَ اَذْهَبْ"], correct: 1, exp: "Larangan ditujukan pada orang kedua (Ta-)." },
                    { q: "Kalimat 'Laa Tashrab' berarti...", options: ["Dia tidak minum", "Saya jangan minum", "Janganlah kamu minum", "Kamu sedang tidak minum"], correct: 2, exp: "Larangan untuk minum." },
                    { q: "Struktur Fi'il Nahi adalah...", options: ["Laa + Madhi", "Laa + Mudhari' Majzum", "Laa + Amr", "Laa + Isim"], correct: 1, exp: "Laa + Mudhari' yang disukunkan akhirnya." },
                    { q: "Manakah yang merupakan Laa Nahiyah dalam Al-Qur'an?", options: ["Laa Raiba fiih", "Laa Tahzan", "Laa A'budu", "Laa Ilaha Illallah"], correct: 1, exp: "Laa Tahzan (Jangan bersedih) adalah larangan/nahi." },
                    { q: "Akhiran 'Nuun' pada jamak (Yaktubuuna) jika terkena Laa Nahiyah akan...", options: ["Tetap", "Dibuang", "Berubah jadi Alif", "Jadi Fathah"], correct: 1, exp: "Tanda jazm untuk jamak adalah membuang Nun (Laa Taktubuu)." }
                ]
            },
            {
                id: "p7",
                title: "Tasrif Lughawi: Harmoni Subjek",
                a: "1. Santri hafal 14 Dhamir secara berurutan.<br>2. Santri mampu menyelaraskan kata kerja dengan subjek.<br>3. Santri menghargai keberagaman lawan bicara.",
                b: "Bahasa Arab mengakomodasi setiap identitas subjek dengan sangat detail.",
                c: [
                    "Pendahuluan: Menghafal 14 Dhamir dengan gerakan tangan (20 Menit).",
                    "Eksplorasi: Menempelkan akhiran pada kata dasar (35 Menit).",
                    "Drilling: Simulasi percakapan berganti-ganti subjek (30 Menit).",
                    "Evaluasi: Tes cepat lisan 14 perubahan kata (15 Menit)."
                ],
                questions: [
                    { q: "Berapa jumlah total Dhamir (kata ganti) dalam Tasrif Lughawi?", options: ["6", "10", "12", "14"], correct: 3, exp: "Dari Hua sampai Nahnu berjumlah 14." },
                    { q: "Dhamir untuk 'Mereka (Lk)' adalah...", options: ["Huma", "Hum", "Hunna", "Antum"], correct: 1, exp: "Hum merujuk pada jamak laki-laki ghaib." },
                    { q: "Perubahan Madhi untuk 'Anta' (Kamu Lk) adalah...", options: ["Kataba", "Katabti", "Katabta", "Katabtu"], correct: 2, exp: "Akhiran -ta untuk Anta." },
                    { q: "Akhiran '-na' pada fi'il Madhi (Katabnaa) merujuk pada...", options: ["Saya", "Kami", "Mereka (Pr)", "Kamu (Pr)"], correct: 1, exp: "-naa panjang merujuk pada Nahnu (Kami)." },
                    { q: "Dhamir 'Antunna' digunakan untuk...", options: ["Kalian (Pr)", "Mereka (Pr)", "Kami", "Kamu (Pr)"], correct: 0, exp: "Kalian perempuan banyak." },
                    { q: "Perubahan Mudhari' untuk 'Ana' selalu diawali huruf...", options: ["Ya", "Ta", "Alif/Hamzah", "Nun"], correct: 2, exp: "Ana -> A-ktubu." },
                    { q: "Dhamir 'Hiya' (Dia Pr) pada Mudhari' diawali huruf...", options: ["Ya", "Ta", "Alif", "Nun"], correct: 1, exp: "Hiya menggunakan awalan Ta (Taktubu)." },
                    { q: "Kata كَتَبْتُ (Katabtu) berarti...", options: ["Kamu menulis", "Dia menulis", "Saya menulis", "Kami menulis"], correct: 2, exp: "Akhiran -tu merujuk pada Ana (Saya)." },
                    { q: "Mana dhamir yang menunjukkan dua orang (Mutsanna)?", options: ["Huma & Antuma", "Hum & Antum", "Hunna & Antunna", "Ana & Nahnu"], correct: 0, exp: "Huma (mereka berdua), Antuma (kalian berdua)." },
                    { q: "Akhiran '-uu' dan Alif pada Madhi (Katabuu) merujuk pada...", options: ["Dia", "Mereka (Lk)", "Kalian (Lk)", "Kami"], correct: 1, exp: "Tanda jamak laki-laki ghaib (Hum)." }
                ]
            },
            {
                id: "p8",
                title: "Review Akbar & Integrasi Tekstual",
                a: "1. Santri mampu mengidentifikasi status kata kerja dalam teks Arab gundul.<br>2. Santri siap mengikuti ujian sumatif.<br>3. Santri termotivasi melanjutkan ke level NAH-107.",
                b: "Ilmu adalah cahaya. Mengakhiri sesi belajar dengan syukur adalah kunci keberkahan ilmu.",
                c: [
                    "Pendahuluan: Review peta konsep dari Sesi 1-7 (15 Menit).",
                    "Analisis Teks: Membedah satu paragraf kitab gundul (45 Menit).",
                    "Persiapan: Simulasi ujian sumatif mini (20 Menit).",
                    "Penutup: Ijazah materi secara simbolis (10 Menit)."
                ],
                questions: [
                    { q: "Jika Anda menemukan kata يَخْرُجُ, apa wazn-nya?", options: ["Yaf'alu", "Yaf'ilu", "Yaf'ulu", "Yuf'alu"], correct: 2, exp: "Ra berharakat dhommah (Bab 1)." },
                    { q: "Apa akar kata (Fa-Ain-Lam) dari kata مَسْجِدٌ?", options: ["M-S-J", "S-J-D", "M-S-D", "J-D-A"], correct: 1, exp: "Sajada (Sujud) adalah akar katanya." },
                    { q: "Manakah yang merupakan Fi'il Amr?", options: ["يَذْهَبُ", "لاَ تَذْهَبْ", "اِذْهَبْ", "ذَهَبَ"], correct: 2, exp: "Idzhab adalah perintah (Pergilah)." },
                    { q: "Kata 'Sami'a' berarti 'Mendengar', apa bentuk 'Sedang Mendengar'?", options: ["Yasma'u", "Yasmu'u", "Yasmi'u", "Asma'u"], correct: 0, exp: "Bab 4 (i-a) -> Yasma'u." },
                    { q: "Perubahan kata dari satu bentuk ke bentuk lain disebut...", options: ["I'rab", "Tasrif", "Bina", "Isytiqaq"], correct: 1, exp: "Tasrif adalah pendistribusian/perubahan bentuk kata." },
                    { q: "Apa arti 'Laa Ta'kul'?", options: ["Dia tidak makan", "Jangan makan", "Kamu sudah makan", "Saya mau makan"], correct: 1, exp: "Fi'il Nahi (Jangan makan)." },
                    { q: "Mana yang merupakan huruf Mudhara'ah?", options: ["Wawu", "Kaf", "Nun", "Lam"], correct: 2, exp: "A-N-A-I-T-U (Nun termasuk)." },
                    { q: "Bagaimana cara mencari kata 'Yanshuruna' di kamus?", options: ["Cari huruf Ya", "Cari huruf Nun (awal akar)", "Cari huruf Wawu", "Cari huruf Ra"], correct: 1, exp: "Kamus Arab disusun berdasarkan akar kata (N-Sh-R)." },
                    { q: "Isim yang menunjukkan pelaku (orang yang melakukan) disebut...", options: ["Isim Maf'ul", "Isim Fail", "Isim Makan", "Isim Zaman"], correct: 1, exp: "Isim Fail (seperti Kaatib = Penulis)." },
                    { q: "Modul NAH-106 ini membahas Fi'il...", options: ["Mujarrad", "Mazid", "Ruba'i", "Mu'tal"], correct: 0, exp: "Fokus pada Tsulatsi Mujarrad (3 huruf asli)." }
                ]
            }
        ];

        function showTab(id) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + id).classList.add('active');
            
            if (id === 'final') {
                renderFinalExam();
            } else {
                renderModule(id);
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function renderModule(id) {
            const data = moduleData.find(m => m.id === id);
            const rmpContainer = document.getElementById('rmp-container');
            const quizContainer = document.getElementById('quiz-container');
            const quizWrapper = document.getElementById('quiz-section-wrapper');
            
            quizWrapper.style.display = "block";

            // Render RMP
            rmpContainer.innerHTML = `
                <div class="rmp-card">
                    <div class="p-8 md:p-12">
                        <div class="flex items-center gap-4 mb-6">
                            <span class="bg-blue-600 text-white px-4 py-1 rounded-full text-sm font-bold">SESI ${id.replace('p','')}</span>
                            <h2 class="text-3xl font-bold text-slate-900">${data.title}</h2>
                        </div>
                        <div class="grid lg:grid-cols-3 gap-10">
                            <div class="lg:col-span-1 space-y-8">
                                <section>
                                    <h3 class="section-header text-blue-600">A. Tujuan Pembelajaran</h3>
                                    <div class="text-slate-700 text-sm leading-relaxed space-y-2">${data.a}</div>
                                </section>
                                <section class="bg-emerald-50 p-6 rounded-2xl border border-emerald-100">
                                    <h3 class="section-header text-emerald-700 border-emerald-200">B. Keterkaitan Nilai Islam</h3>
                                    <p class="text-slate-700 text-sm italic">${data.b}</p>
                                </section>
                            </div>
                            <div class="lg:col-span-2">
                                <h3 class="section-header text-slate-800">C. Skenario Pembelajaran</h3>
                                <div class="space-y-4">
                                    ${data.c.map((step, sIdx) => `
                                        <div class="flex gap-4 items-start p-4 bg-slate-50 rounded-xl hover:bg-slate-100 transition">
                                            <div class="step-circle">${sIdx + 1}</div>
                                            <p class="text-slate-700 font-medium">${step}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Render Quiz
            let quizHtml = "";
            data.questions.forEach((q, qIdx) => {
                quizHtml += `
                    <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm transition hover:shadow-md">
                        <p class="font-bold text-slate-900 mb-4">${qIdx + 1}. ${q.q}</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${q.options.map((opt, oIdx) => `
                                <button onclick="checkAnswer('${id}', ${qIdx}, ${oIdx})" 
                                        id="q-${id}-${qIdx}-${oIdx}"
                                        class="quiz-option p-3 rounded-lg text-sm font-medium border border-slate-200">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                        <div id="feedback-${id}-${qIdx}" class="mt-4 hidden p-3 rounded-lg text-xs leading-relaxed"></div>
                    </div>
                `;
            });
            quizContainer.innerHTML = quizHtml;
        }

        function checkAnswer(sessionId, qIdx, oIdx) {
            const data = moduleData.find(m => m.id === sessionId);
            const question = data.questions[qIdx];
            const feedbackEl = document.getElementById(`feedback-${sessionId}-${qIdx}`);
            
            const buttons = document.querySelectorAll(`[id^="q-${sessionId}-${qIdx}-"]`);
            buttons.forEach(btn => btn.disabled = true);

            const selectedBtn = document.getElementById(`q-${sessionId}-${qIdx}-${oIdx}`);
            const correctBtn = document.getElementById(`q-${sessionId}-${qIdx}-${question.correct}`);

            feedbackEl.classList.remove('hidden');
            
            if (oIdx === question.correct) {
                selectedBtn.classList.add('correct');
                feedbackEl.innerHTML = `<strong>Mumtaz!</strong> ${question.exp}`;
                feedbackEl.className = "mt-4 p-3 rounded-lg text-xs bg-green-100 text-green-800";
            } else {
                selectedBtn.classList.add('wrong');
                correctBtn.classList.add('correct');
                feedbackEl.innerHTML = `<strong>Kurang tepat.</strong> Jawaban benar: ${question.options[question.correct]}. ${question.exp}`;
                feedbackEl.className = "mt-4 p-3 rounded-lg text-xs bg-red-100 text-red-800";
            }
        }

        function renderFinalExam() {
            document.getElementById('quiz-section-wrapper').style.display = "none";
            const rmpContainer = document.getElementById('rmp-container');
            
            rmpContainer.innerHTML = `
                <div class="bg-slate-900 text-white p-12 rounded-3xl text-center">
                    <h2 class="text-4xl font-black mb-4">Ujian Sumatif Akhir</h2>
                    <p class="text-slate-400 mb-8">Uji kemampuan komprehensif Anda dari Sesi 1 sampai 8.</p>
                    <div class="bg-white/5 border border-white/10 p-10 rounded-2xl max-w-2xl mx-auto">
                         <svg class="mx-auto h-20 w-20 text-blue-500 mb-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        <p class="text-lg font-medium">Ujian ini terdiri dari 40 soal acak dari seluruh bank soal.</p>
                        <button onclick="startFinal()" class="mt-8 bg-blue-600 hover:bg-blue-700 px-10 py-4 rounded-full font-bold text-white transition transform hover:scale-105">Mulai Ujian Sekarang</button>
                    </div>
                </div>
            `;
        }

        function startFinal() {
            // Logika untuk mencampur soal bisa ditambahkan di sini
            alert("Sistem Ujian Sumatif sedang mempersiapkan soal acak. Harap tunggu...");
        }

        window.onload = () => renderModule('p1');
    </script>
</body>
