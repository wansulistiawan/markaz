    <script>
        const modules = [
            {
                id: 1,
                title: "Hakikat & Komponen Kimiawi Sel",
                category: "BIOLOGI SEL",
                images: [
                    { url: "https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&q=80&w=800", cap: "Struktur Molekuler Kompleks Sel" },
                    { url: "https://images.unsplash.com/photo-1530026405186-ed1f139313f8?auto=format&fit=crop&q=80&w=800", cap: "Visualisasi Mikroskopis Sitoplasma" }
                ],
                rmp: {
                    kd: "3.1 Memahami komponen kimiawi sel dan struktur makromolekul.",
                    tujuan: "Siswa mampu mengidentifikasi komponen organik dan anorganik sel.",
                    indikator: "Menganalisis peran air (QS. Al-Anbiya: 30) dan struktur lipid/protein."
                },
                content: `
                    <p>Sel merupakan unit terkecil kehidupan yang memiliki kompleksitas luar biasa. Dalam IPA-105, kita mempelajari bahwa sel bukan sekadar kotak kosong, melainkan sebuah sistem kimiawi yang diatur secara presisi. Secara historis, penemuan sel diawali oleh Robert Hooke, namun pemahaman mendalam tentang sel sebagai satuan fungsional ditegaskan oleh ilmuwan seperti Schleiden dan Schwann melalui berbagai eksperimen laboratorium yang membuktikan keberadaan sitoplasma dan nukleus.</p>
                    <p>Secara kimiawi, sel tersusun atas komponen organik dan anorganik yang saling berinteraksi secara harmonis. Komponen organik meliputi karbohidrat sebagai sumber energi utama, protein sebagai pembentuk struktur dan enzim katalis, lemak (lipid) sebagai cadangan energi dan penyusun membran sel yang selektif, serta asam nukleat (DNA/RNA) sebagai pembawa instruksi genetik yang menentukan karakteristik makhluk hidup tersebut secara turun-temurun.</p>
                    <p>Air merupakan komponen anorganik terbesar dalam sel, mencakup 70% hingga 90% dari total massa sel hidup. Air berfungsi sebagai pelarut universal bagi reaksi biokimia dan media transportasi zat antar organel. Keberadaan air dalam sel ini sangat selaras dengan firman Allah dalam QS. Al-Anbiya: 30, "Dan dari air Kami jadikan segala sesuatu yang hidup." Hal ini menunjukkan bahwa kehidupan pada tingkat seluler pun sangat bergantung pada molekul air yang melimpah.</p>
                    <p>Perbedaan mendasar sel terletak pada struktur intinya, yaitu sel Prokariotik yang tidak memiliki membran inti dan sel Eukariotik yang memilikinya secara lengkap. Struktur eukariotik yang lebih kompleks memungkinkan terjadinya spesialisasi fungsi organel yang lebih tinggi, yang sangat krusial bagi organisme multiseluler seperti manusia. Tanpa membran inti, materi genetik akan tersebar bebas di sitoplasma seperti yang terjadi pada bakteri sederhana.</p>
                    <p>Membran plasma sel adalah penjaga gerbang yang sangat cerdas dan responsif. Tersusun atas lapisan fosfolipid bilayer dengan protein integral dan perifer, membran ini mampu menyeleksi molekul mana yang boleh masuk dan keluar sel. Keseimbangan ion di dalam dan luar sel dijaga melalui proses transpor pasif dan aktif, memastikan stabilitas lingkungan internal atau homeostasis tetap terjaga dengan baik demi keberlangsungan hidup sel.</p>
                    <p>Pemahaman tentang komponen kimiawi sel memberikan landasan bahwa kehidupan dibangun dari komponen-komponen yang sangat kecil namun sangat terorganisir. Tidak ada satu molekul pun yang bergerak tanpa tujuan di dalam sel; semua tunduk pada hukum-hukum biokimia yang telah ditetapkan oleh Al-Khaliq. Kesadaran akan keteraturan mikroskopis ini seharusnya menambah ketundukan dan kekaguman kita kepada Sang Pencipta yang mengatur segalanya.</p>
                `,
                questions: [
                    { q: "Siapa ilmuwan yang pertama kali melihat sel melalui mikroskop sederhana?", a: ["Robert Hooke", "Louis Pasteur", "Gregor Mendel", "Charles Darwin"], c: 0 },
                    { q: "Senyawa organik utama yang menyusun lapisan ganda membran sel adalah...", a: ["Karbohidrat", "Fosfolipid", "Garam Mineral", "Air"], c: 1 },
                    { q: "Molekul pembawa informasi genetik di dalam nukleus adalah...", a: ["ATP", "Lipid", "Asam Nukleat", "Karbohidrat"], c: 2 }
                ]
            },
            {
                id: 2,
                title: "Struktur Organel & Spesialisasi Sel",
                category: "BIOLOGI SEL",
                images: [
                    { url: "https://images.unsplash.com/photo-1554475900-0a0350e3fc7b?auto=format&fit=crop&q=80&w=800", cap: "Mitokondria: Pusat Energi Sel" },
                    { url: "https://images.unsplash.com/photo-1518186239751-f7477d4223a3?auto=format&fit=crop&q=80&w=800", cap: "Interaksi Organel dalam Sitoplasma" }
                ],
                rmp: {
                    kd: "3.2 Mendeskripsikan struktur dan fungsi organel sel hewan serta tumbuhan.",
                    tujuan: "Siswa mampu membedakan organel spesifik pada sel hewan dan tumbuhan.",
                    indikator: "Menjelaskan fungsi Mitokondria, Kloroplas, dan sistem endomembran."
                },
                content: `
                    <p>Organel sel adalah struktur khusus yang tersuspensi di dalam sitoplasma, masing-masing memiliki peran vital yang tak tergantikan. Nukleus atau inti sel sering dianggap sebagai "pusat komando" karena di dalamnya tersimpan kromosom yang membawa kode-kode kehidupan. Tanpa nukleus, sel tidak akan memiliki instruksi untuk membelah diri atau melakukan sintesis protein yang diperlukan untuk pertumbuhan dan regenerasi jaringan yang rusak.</p>
                    <p>Mitokondria dikenal sebagai "The Powerhouse of the Cell" karena kemampuannya menghasilkan energi dalam bentuk ATP melalui proses respirasi seluler yang kompleks. Jumlah mitokondria di dalam sebuah sel sangat bergantung pada tingkat aktivitas metabolisme sel tersebut. Misalnya, sel otot jantung memiliki ribuan mitokondria untuk memastikan ketersediaan energi yang konstan bagi detak jantung manusia sepanjang hidupnya.</p>
                    <p>Sistem endomembran yang terdiri dari Retikulum Endoplasma (RE), Badan Golgi, dan Lisosom bekerja seperti pabrik terpadu dan sistem kurir yang handal. RE kasar yang bertaburan ribosom bertugas menyintesis protein, sementara Badan Golgi memproses dan mengemasnya ke dalam vesikel untuk dikirim ke tujuan yang tepat. Kerjasama antar organel ini menunjukkan efisiensi sistem logistik yang sempurna dalam skala mikroskopis.</p>
                    <p>Sel tumbuhan memiliki dua organel khas yang tidak dimiliki sel hewan, yaitu dinding sel dan kloroplas yang mengandung klorofil. Dinding sel memberikan kekuatan struktural yang memungkinkan tumbuhan berdiri tegak tanpa rangka tulang, sementara kloroplas menangkap energi cahaya matahari dan mengubahnya menjadi energi kimia melalui fotosintesis. Hal ini menjadikan tumbuhan sebagai produsen utama dalam rantai makanan global.</p>
                    <p>Sebaliknya, sel hewan memiliki Lisosom dan Sentriol yang lebih dominan perannya dalam kehidupan seluler. Lisosom berfungsi sebagai sistem pembuangan sampah seluler, mengandung enzim hidrolitik kuat yang dapat menghancurkan patogen berbahaya atau organel sel yang sudah aus. Sentriol berperan penting dalam mengarahkan pembelahan sel dengan membentuk benang-benang spindel selama proses mitosis berlangsung agar pembagian kromosom akurat.</p>
                    <p>Spesialisasi sel adalah bukti keagungan penciptaan, di mana sel-sel yang memiliki materi genetik yang sama dapat berdiferensiasi menjadi bentuk yang berbeda-beda sesuai fungsinya. Sel saraf berbentuk memanjang untuk menghantarkan impuls listrik, sedangkan sel darah merah berbentuk bikonkaf untuk memaksimalkan pengikatan oksigen. Semua kerumitan ini diatur oleh regulasi genetik yang sangat presisi di dalam inti sel eukariotik.</p>
                `,
                questions: [
                    { q: "Organel yang berfungsi menghasilkan energi ATP adalah...", a: ["Ribosom", "Mitokondria", "Lisosom", "Vakuola"], c: 1 },
                    { q: "Bagian sel tumbuhan yang memberikan kekakuan struktural adalah...", a: ["Membran Sel", "Dinding Sel", "Sentriol", "Lisosom"], c: 1 },
                    { q: "Tempat terjadinya fotosintesis pada sel tumbuhan adalah...", a: ["Mitokondria", "Kloroplas", "Nukleus", "Vakuola"], c: 1 }
                ]
            },
            {
                id: 3,
                title: "Bioproses & Pembelahan Seluler",
                category: "BIOLOGI SEL",
                images: [
                    { url: "https://images.unsplash.com/photo-1559757175-7b315e542847?auto=format&fit=crop&q=80&w=800", cap: "Tahapan Pembelahan Mitosis" },
                    { url: "https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&q=80&w=800", cap: "Kromatid yang Terpisah dalam Anafase" }
                ],
                rmp: {
                    kd: "3.3 Menganalisis bioproses transpor membran dan reproduksi sel.",
                    tujuan: "Siswa memahami mekanisme osmosis dan tahapan pembelahan mitosis.",
                    indikator: "Membedakan transpor aktif-pasif dan urutan fase pembelahan P-M-A-T."
                },
                content: `
                    <p>Bioproses sel mencakup mekanisme transpor zat yang menjaga keseimbangan kimiawi internal agar sel tetap berfungsi optimal. Transpor pasif seperti difusi dan osmosis terjadi secara alami tanpa memerlukan energi ATP, di mana molekul bergerak mengikuti gradien konsentrasi. Osmosis sangat penting bagi tumbuhan untuk menyerap air dari tanah dan menjaga tekanan turgor agar sel tetap tegang dan tidak layu.</p>
                    <p>Transpor aktif terjadi ketika sel harus memindahkan zat melawan gradien konsentrasi, yang mutlak membutuhkan energi dan protein pembawa khusus. Contoh yang paling terkenal adalah pompa Natrium-Kalium pada sel saraf manusia yang menjaga beda potensial listrik. Selain itu, sel juga melakukan endositosis untuk menelan partikel besar dan eksositosis untuk mengeluarkan sisa metabolisme atau hormon penting ke luar sel.</p>
                    <p>Reproduksi sel adalah proses krusial untuk pertumbuhan organisme dan perbaikan jaringan yang rusak. Mitosis menghasilkan dua sel anakan yang identik secara genetik dengan sel induknya (diploid, $2n$). Proses ini terjadi secara rutin di sel-sel somatik tubuh kita, seperti saat kulit kita yang terluka menutup kembali atau saat tubuh seorang anak bertambah tinggi selama masa pertumbuhan remaja.</p>
                    <p>Pembelahan sel terbagi menjadi fase-fase yang sangat teratur: Profase, Metafase, Anafase, dan Telofase (P-M-A-T). Sebelum pembelahan dimulai, sel melewati fase Interfase di mana DNA direplikasi dengan akurasi yang luar biasa tinggi. Kesalahan kecil dalam replikasi ini bisa berakibat fatal bagi sel, namun sel memiliki mekanisme pemeriksaan mandiri untuk memastikan semuanya berjalan dengan benar.</p>
                    <p>Meiosis atau pembelahan reduksi hanya terjadi pada organ reproduksi untuk menghasilkan sel gamet (sperma dan sel telur). Meiosis menghasilkan empat sel anakan dengan jumlah kromosom setengah dari induknya (haploid, $n$). Hal ini memastikan bahwa ketika terjadi fertilisasi ($n + n$), jumlah kromosom anak akan kembali normal menjadi $2n$ atau 46 kromosom, menjaga stabilitas jumlah kromosom spesies.</p>
                    <p>Mekanisme pembelahan sel yang tertib ini menunjukkan bahwa ada aturan yang sangat disiplin di tingkat mikroskopis tubuh kita. Sel-sel tidak membelah secara acak tanpa arah; jika kontrol pembelahan ini rusak, sel akan membelah tanpa henti dan membentuk tumor berbahaya. Keteraturan ini adalah nikmat Allah yang luar biasa yang menjaga tubuh kita tetap sehat dan berfungsi sebagaimana mestinya.</p>
                `,
                questions: [
                    { q: "Perpindahan air melalui membran selektif permeabel disebut...", a: ["Difusi", "Osmosis", "Eksositosis", "Pompa Ion"], c: 1 },
                    { q: "Pembelahan yang menghasilkan sel anakan haploid (n) adalah...", a: ["Mitosis", "Meiosis", "Amitosis", "Biner"], c: 1 },
                    { q: "Fase di mana kromosom berjejer di tengah sel disebut...", a: ["Profase", "Metafase", "Anafase", "Telofase"], c: 1 }
                ]
            },
            {
                id: 4,
                title: "Embriologi: Fase Nutfah & Alaqah",
                category: "EMBRIOLOGI",
                images: [
                    { url: "https://images.unsplash.com/photo-1581093583449-825597793740?auto=format&fit=crop&q=80&w=800", cap: "Mikrograf Fertilisasi Sperma & Sel Telur" },
                    { url: "https://images.unsplash.com/photo-1559757148-5c350d0d3c56?auto=format&fit=crop&q=80&w=800", cap: "Tahap Blastokista dalam Rahim" }
                ],
                rmp: {
                    kd: "4.1 Memahami tahapan pembentukan janin dalam perspektif biologi dan Al-Qur'an.",
                    tujuan: "Siswa mampu menjelaskan fase fertilsasi hingga implantasi.",
                    indikator: "Menjelaskan istilah Nutfah Amusyaj dan ciri fase Alaqah."
                },
                content: `
                    <p>Embriologi manusia dimulai dari pertemuan sel sperma dan sel telur yang disebut fertilisasi di dalam tuba fallopi. Dalam terminologi Al-Qur'an, fase awal ini disebut Nutfah Amusyaj (titisan air yang bercampur). Nutfah mengandung seluruh potensi cetak biru manusia dalam bentuk DNA yang akan menentukan segala sifat fisik dari warna mata hingga tinggi badan di masa depan.</p>
                    <p>Zigot yang terbentuk akan membelah secara cepat melalui mitosis (Cleavage) sambil bergerak perlahan menuju rahim. Rahim disebut sebagai "Qararin Makin" (tempat yang kokoh) karena lokasinya yang sangat terlindungi secara anatomis di dalam panggul wanita. Lapisan otot rahim yang kuat dan elastis memberikan lingkungan yang stabil bagi calon manusia baru untuk berkembang selama sembilan bulan.</p>
                    <p>Setelah menempel pada dinding rahim (implantasi), zigot berkembang menjadi Alaqah pada minggu ketiga. Secara bahasa, Alaqah berarti lintah atau sesuatu yang menggantung di dinding rahim. Secara ilmiah, embrio pada tahap ini memang menggantung dan menyerap nutrisi melalui plasenta awal layaknya seekor lintah yang menempel pada inangnya untuk bertahan hidup.</p>
                    <p>Tahap Alaqah adalah momen krusial di mana sistem saraf pusat mulai terbentuk melalui proses yang disebut neurulasi. Meskipun ukurannya sangat kecil, pola dasar tubuh manusia mulai ditetapkan pada fase ini melalui instruksi genetik yang sangat kompleks dan detail. Pembuluh darah pertama juga mulai terbentuk untuk mendukung transportasi oksigen bagi sel-sel yang membelah.</p>
                    <p>Keajaiban luar biasa fase Alaqah adalah kemampuannya bertahan hidup di dalam rahim ibu tanpa ditolak oleh sistem imun. Ibu tidak menyerang embrio tersebut meskipun ia memiliki materi genetik "asing" dari ayah. Allah menciptakan sistem imun khusus di rahim agar janin dianggap sebagai bagian dari tubuh ibu sendiri, sebuah mekanisme perlindungan biologis yang sangat sempurna.</p>
                    <p>Merenungi fase Alaqah menyadarkan kita bahwa asal mula manusia hanyalah dari setetes air yang tidak berharga, namun diangkat derajatnya menjadi makhluk yang sempurna. Kesadaran akan asal usul yang sangat lemah ini seharusnya menjauhkan manusia dari sifat sombong dan angkuh. Kita semua bermula dari kerentanan yang sama, dijaga oleh kasih sayang Sang Pencipta dalam kegelapan rahim.</p>
                `,
                questions: [
                    { q: "Pertemuan sel sperma dan sel telur disebut...", a: ["Ovulasi", "Menstruasi", "Fertilisasi", "Implantasi"], c: 2 },
                    { q: "Istilah 'Qararin Makin' dalam Al-Qur'an merujuk pada...", a: ["Jantung", "Rahim", "Otak", "Tangan"], c: 1 },
                    { q: "Fase Alaqah secara bahasa memiliki arti...", a: ["Sesuatu yang menggantung", "Sekerat daging", "Tulang belulang", "Air jernih"], c: 0 }
                ]
            },
            {
                id: 5,
                title: "Embriologi: Mudghah & Organogenesis",
                category: "EMBRIOLOGI",
                images: [
                    { url: "https://images.unsplash.com/photo-1532187875605-2fe35952016a?auto=format&fit=crop&q=80&w=800", cap: "Janin Usia 8 Minggu (Mudghah)" },
                    { url: "https://images.unsplash.com/photo-1584036561566-baf8f5f1b144?auto=format&fit=crop&q=80&w=800", cap: "Pembentukan Organ Vital Jantung" }
                ],
                rmp: {
                    kd: "4.2 Mendeskripsikan pembentukan organ dan tulang janin.",
                    tujuan: "Siswa memahami fase Mudghah dan Izam serta organogenesis jantung.",
                    indikator: "Menjelaskan arti Mudghah dan 3 kegelapan rahim (QS. Az-Zumar: 6)."
                },
                content: `
                    <p>Setelah fase Alaqah selesai, janin berkembang memasuki tahap Mudghah (sekerat daging). Nama ini sangat sesuai dengan penampilan fisik embrio pada usia 4-5 minggu yang memiliki tonjolan-tonjolan somit di punggungnya. Jika dilihat melalui mikroskop elektron, janin tampak seperti bekas kunyahan pada daging, persis seperti deskripsi linguistik yang diberikan dalam kitab suci berabad-abad silam.</p>
                    <p>Pada fase Mudghah, terjadi proses diferensiasi sel secara besar-besaran dan sangat cepat. Sel-sel yang tadinya serupa mulai berubah identitas menjadi sel jantung, sel hati, dan sel saraf yang spesifik. Inilah fase paling kritis dalam kehamilan di mana paparan zat berbahaya atau obat-obatan tertentu dapat menyebabkan kecacatan organ janin yang permanen.</p>
                    <p>Tahap selanjutnya adalah pembentukan tulang (Izam) yang dimulai dari mesenkim. Menariknya, ilmu embriologi modern membuktikan bahwa rangka kartilago terbentuk sebelum serabut otot mulai membungkusnya secara merata. Urutan ini sesuai dengan narasi Al-Qur'an yang menyebutkan pembentukan tulang terlebih dahulu, baru kemudian pembungkusan tulang tersebut oleh daging (otot).</p>
                    <p>Pembentukan organ atau organogenesis berjalan dengan presisi yang menakjubkan di bawah kendali genetik. Jantung adalah organ fungsional pertama yang mulai berdetak untuk mengedarkan darah ke seluruh tubuh kecil janin. Hal ini membuktikan bahwa kehidupan secara fungsional telah dimulai sejak dini, jauh sebelum janin mampu melakukan gerakan sadar yang dirasakan oleh sang ibu.</p>
                    <p>Allah SWT berfirman bahwa Dia menciptakan manusia dalam tiga kegelapan (QS. Az-Zumar: 6). Sains modern mengidentifikasi tiga lapisan pelindung ini sebagai: kegelapan dinding perut ibu, kegelapan dinding rahim, dan kegelapan selaput ketuban (amnion). Ketiga lapisan ini berfungsi sebagai perisai dari benturan fisik, perubahan suhu ekstrim, dan paparan cahaya yang berlebihan.</p>
                    <p>Segala kerumitan desain janin ini terjadi tanpa kendali sadar dari sang ibu maupun janin itu sendiri. Hal ini mempertegas eksistensi Al-Mushawwir (Sang Maha Membentuk Rupa) yang mengatur setiap lekuk tubuh janin agar menjadi manusia yang fungsional dan estetis. Kita hanyalah saksi atas keajaiban penciptaan yang terjadi di ruang gelap yang tak terjangkau oleh mata manusia biasa.</p>
                `,
                questions: [
                    { q: "Mudghah mukhallaqah secara bahasa berarti...", a: ["Belum berbentuk", "Sempurna kejadiannya", "Sekerat tulang", "Air yang terpancar"], c: 1 },
                    { q: "Organ janin yang pertama kali berfungsi secara aktif adalah...", a: ["Otak", "Jantung", "Paru-paru", "Ginjal"], c: 1 },
                    { q: "Berapa jumlah 'kegelapan' yang melindungi janin di dalam rahim?", a: ["1", "2", "3", "4"], c: 2 }
                ]
            },
            {
                id: 6,
                title: "Peniupan Ruh & Hak Hidup Janin",
                category: "EMBRIOLOGI",
                images: [
                    { url: "https://images.unsplash.com/photo-1516627145497-ae6968895b74?auto=format&fit=crop&q=80&w=800", cap: "Interaksi Ibu dan Janin Usia 4 Bulan" },
                    { url: "https://images.unsplash.com/photo-1505751172876-fa1923c5c528?auto=format&fit=crop&q=80&w=800", cap: "USG: Janin Mulai Bergerak Aktif" }
                ],
                rmp: {
                    kd: "4.3 Menganalisis aspek spiritual dan hukum perkembangan janin.",
                    tujuan: "Siswa memahami batas peniupan ruh dan hukum syar'i terkait janin.",
                    indikator: "Menyebutkan usia peniupan ruh (120 hari) dan 4 takdir janin."
                },
                content: `
                    <p>Setelah seluruh fase fisik (tulang dan daging) selesai terbentuk, tibalah tahap transendental yaitu peniupan ruh. Berdasarkan hadits Nabi Muhammad SAW yang diriwayatkan oleh Abdullah bin Mas'ud, ruh ditiupkan saat janin genap berusia 120 hari atau sekitar 4 bulan. Pada titik inilah status janin berubah secara fundamental dari sekadar benda biologis menjadi jiwa manusia (Insan).</p>
                    <p>Bersamaan dengan peniupan ruh, malaikat diperintahkan untuk mencatat empat ketetapan penting (Takdir) bagi sang janin. Ketetapan tersebut meliputi jumlah rezekinya selama hidup, batas usianya (ajal), amal perbuatannya, dan akhir hidupnya apakah ia termasuk orang yang berbahagia atau celaka. Ini mengajarkan kita bahwa kehidupan adalah amanah yang sudah digariskan oleh Allah SWT.</p>
                    <p>Dari sisi hukum Islam (fiqih), setelah ruh ditiupkan, janin memiliki hak-hak hukum yang penuh sebagaimana manusia dewasa. Aborsi dilarang keras dilakukan pada tahap ini kecuali dalam keadaan darurat medis yang benar-benar mengancam nyawa sang ibu. Jika janin gugur setelah usia 4 bulan, ia wajib dimandikan, dikafani, diberi nama, dan dishalatkan secara layak oleh pihak keluarga.</p>
                    <p>Pada usia 4 hingga 5 bulan kehamilan, janin mulai mampu merasakan rangsangan suara dari luar rahim. Pendengaran adalah indera pertama yang berfungsi sempurna, sesuai dengan urutan penciptaan indera dalam Al-Qur'an: pendengaran, penglihatan, baru kemudian hati. Oleh karena itu, sangat disarankan bagi orang tua untuk sering membacakan ayat suci Al-Qur'an sebagai stimulasi awal bagi ruh janin.</p>
                    <p>Pertumbuhan janin setelah melewati bulan keempat fokus pada penyempurnaan fungsi organ-organ dalam dan pertambahan berat badan yang signifikan. Paru-paru adalah organ terakhir yang mencapai kematangan fungsional sepenuhnya, biasanya hanya beberapa saat menjelang kelahiran. Hal ini memastikan bayi siap untuk bernapas secara mandiri di atmosfer bumi segera setelah ia lahir ke dunia.</p>
                    <p>Memahami batasan 120 hari ini memberikan kita perspektif yang mendalam tentang kemuliaan nyawa seorang manusia. Kita diajarkan bahwa manusia bukan sekadar tumpukan sel yang tersusun rapi, melainkan makhluk mulia yang memiliki dimensi spiritual (Ruh). Dimensi ruh inilah yang membedakan manusia dengan makhluk lainnya dan menjadi tanggung jawab besar yang harus dijaga selama hidup.</p>
                `,
                questions: [
                    { q: "Ruh ditiupkan ke dalam janin pada usia kehamilan...", a: ["40 hari", "80 hari", "120 hari", "9 bulan"], c: 2 },
                    { q: "Indera yang pertama kali berfungsi sempurna pada janin adalah...", a: ["Penglihatan", "Pendengaran", "Penciuman", "Perasa"], c: 1 },
                    { q: "Malaikat mencatat berapa ketetapan takdir saat peniupan ruh?", a: ["2", "3", "4", "5"], c: 2 }
                ]
            },
            {
                id: 7,
                title: "Genetika: Hukum Pewarisan Sifat",
                category: "GENETIKA",
                images: [
                    { url: "https://images.unsplash.com/photo-1579154341098-e4e158cc7f55?auto=format&fit=crop&q=80&w=800", cap: "Model Heliks Ganda DNA" },
                    { url: "https://images.unsplash.com/photo-1507668077129-56e32842fceb?auto=format&fit=crop&q=80&w=800", cap: "Variasi Genetik pada Makhluk Hidup" }
                ],
                rmp: {
                    kd: "5.1 Menerapkan prinsip pewarisan sifat menurut Hukum Mendel.",
                    tujuan: "Siswa mampu memprediksi hasil persilangan monohibrid dan dihibrid.",
                    indikator: "Membedakan genotip-fenotip dan menjelaskan kromosom XY."
                },
                content: `
                    <p>Genetika adalah cabang ilmu biologi yang mempelajari bagaimana sifat-sifat fisik dan fungsional diwariskan dari orang tua kepada keturunannya. Tokoh utama yang meletakkan dasar ilmu ini adalah Gregor Mendel melalui eksperimen terkenalnya dengan tanaman kacang ercis. Mendel menemukan pola-pola matematika yang konsisten dalam pewarisan sifat, yang sekarang kita kenal sebagai Hukum Segregasi dan Hukum Asortasi Bebas.</p>
                    <p>Setiap sifat individu dikendalikan oleh sepasang gen yang disebut alel di dalam kromosom. Ada gen yang bersifat Dominan (kuat, disimbolkan dengan huruf kapital) yang menutupi sifat lain, dan ada gen Resesif (lemah, disimbolkan huruf kecil) yang sifatnya tersembunyi. Genotip adalah susunan genetik yang tidak tampak (misal: Aa), sedangkan Fenotip adalah karakteristik fisik yang terlihat nyata oleh mata.</p>
                    <p>Manusia memiliki total 46 kromosom yang tersusun dalam 23 pasang di setiap inti sel tubuhnya. Sebanyak 22 pasang disebut autosom (kromosom tubuh) dan 1 pasang disebut gonosom atau kromosom seks. Kromosom seks $XY$ akan menentukan jenis kelamin laki-laki, sedangkan kombinasi $XX$ akan menentukan jenis kelamin perempuan. Penentuan ini terjadi secara acak saat pembuahan.</p>
                    <p>Persilangan monohibrid adalah persilangan yang hanya mengamati satu sifat beda saja, misalnya hanya tinggi batang tanaman. Sedangkan persilangan dihibrid mengamati dua sifat beda secara bersamaan, misalnya warna bunga dan bentuk biji. Dengan menggunakan tabel Punnett, para ilmuwan dapat memprediksi persentase kemungkinan munculnya sifat tertentu pada generasi anak (F1) dan cucu (F2) secara akurat.</p>
                    <p>Islam sangat memperhatikan kemurnian keturunan melalui penegakan hukum Nasab yang sangat ketat dalam syariat. Larangan zina dan aturan pernikahan yang jelas bertujuan untuk menjaga agar garis keturunan tidak tercampur baur secara sembarangan. Secara genetik, pemeliharaan nasab ini juga berperan penting dalam mencegah penyebaran penyakit keturunan tertentu yang mungkin muncul akibat perkawinan sedarah.</p>
                    <p>Menariknya, tingkat kesamaan DNA di antara seluruh manusia di dunia mencapai 99,9%, meskipun kita berbeda suku dan bangsa. Hal ini secara ilmiah membuktikan kebenaran Al-Qur'an surah Al-Hujurat: 13 bahwa seluruh manusia benar-benar berasal dari satu nenek moyang yang sama, yaitu Adam dan Hawa. Variasi fisik yang kita lihat hanyalah sebagian kecil dari kekayaan genetik yang Allah ciptakan untuk saling mengenal.</p>
                `,
                questions: [
                    { q: "Siapa ilmuwan yang dijuluki sebagai Bapak Genetika?", a: ["Gregor Mendel", "Charles Darwin", "Robert Hooke", "Albert Einstein"], c: 0 },
                    { q: "Susunan genetik suatu individu yang tidak tampak dari luar disebut...", a: ["Fenotip", "Genotip", "Alel", "Lokus"], c: 1 },
                    { q: "Kromosom seks untuk jenis kelamin perempuan adalah...", a: ["XY", "XO", "XX", "YY"], c: 2 }
                ]
            },
            {
                id: 8,
                title: "Penyakit Genetik & Sidik Jari",
                category: "GENETIKA",
                images: [
                    { url: "https://images.unsplash.com/photo-1526633063041-0f81d89b70d5?auto=format&fit=crop&q=80&w=800", cap: "Keunikan Sidik Jari Manusia" },
                    { url: "https://images.unsplash.com/photo-1579684385127-1ef15d508118?auto=format&fit=crop&q=80&w=800", cap: "Laboratorium Uji DNA Modern" }
                ],
                rmp: {
                    kd: "5.2 Menganalisis variasi genetik dan kelainan bawaan pada manusia.",
                    tujuan: "Siswa memahami penyakit terpaut seks dan keunikan sidik jari.",
                    indikator: "Menjelaskan hemofilia dan tafsir sains QS. Al-Qiyamah: 4."
                },
                content: `
                    <p>Beberapa jenis penyakit dapat diwariskan melalui gen secara turun-temurun, seperti buta warna, hemofilia (darah sulit membeku), dan thalassemia. Penyakit-penyakit ini umumnya bersifat menetap karena kerusakannya berada pada tingkat instruksi molekuler DNA seluler. Meskipun saat ini pengobatan genetik terus berkembang, pencegahan melalui pemilihan pasangan yang sehat tetap menjadi langkah yang paling bijaksana.</p>
                    <p>Penyakit buta warna dan hemofilia umumnya bersifat terpaut pada kromosom X (X-linked). Hal ini menjelaskan mengapa laki-laki jauh lebih berisiko terkena penyakit ini dibandingkan wanita. Wanita biasanya hanya menjadi pembawa sifat (carrier) tanpa merasakan gejala sakit karena masih memiliki satu kromosom X lain yang normal untuk menutupi kekurangan genetik tersebut.</p>
                    <p>Teknologi DNA saat ini telah memungkinkan dilakukannya Tes Paternitas untuk memastikan hubungan biologis antara anak dan ayah dengan tingkat akurasi 99,9%. Dalam hukum Islam, tes DNA dapat digunakan sebagai bukti pendukung (qarinah) dalam kasus-kasus sengketa nasab. Namun, prinsip dasar syariat tetap mengutamakan keabsahan pernikahan sebagai penentu utama status nasab seorang anak di mata hukum.</p>
                    <p>Rekayasa genetika seperti kloning manusia dilarang keras dalam Islam karena dianggap merusak tatanan nasab dan martabat kemanusiaan yang mulia. Namun, rekayasa genetika pada organisme lain seperti bakteri untuk menghasilkan hormon insulin bagi penderita diabetes sangat diperbolehkan. Hal ini karena manfaat medis yang dihasilkan sangat besar bagi kemaslahatan umat manusia tanpa melanggar prinsip ketuhanan.</p>
                    <p>Identifikasi sidik jari atau dermatoglifika adalah bukti lain dari keunikan ciptaan Allah pada setiap individu. Allah berfirman dalam QS. Al-Qiyamah: 4 bahwa Dia mampu menyusun kembali ujung-ujung jari manusia dengan sangat sempurna pada hari kiamat nanti. Isyarat ilmiah ini menunjukkan bahwa sejak dahulu, sidik jari telah ditetapkan sebagai identitas personal yang tidak mungkin tertukar satu sama lain.</p>
                    <p>Modul IPA-107 ini diakhiri dengan kesadaran bahwa dari struktur sel terkecil hingga sistem genetika yang sangat rumit, semuanya adalah tanda nyata kekuasaan Allah. Mempelajari sains seharusnya tidak membuat manusia menjadi sombong, melainkan semakin tunduk dan rendah hati. Semoga ilmu yang kita pelajari menjadi sarana untuk semakin mendekatkan diri kepada Sang Khaliq yang telah merancang kehidupan dengan begitu indah.</p>
                `,
                questions: [
                    { q: "Penyakit keturunan yang menyebabkan darah sukar membeku adalah...", a: ["Anemia", "Hemofilia", "Diabetes", "Leukimia"], c: 1 },
                    { q: "Keunikan ujung jari manusia disebutkan dalam Al-Qur'an surah...", a: ["Al-Baqarah", "Al-Qiyamah", "Al-Kahfi", "Yasin"], c: 1 },
                    { q: "Tes DNA untuk mengetahui hubungan ayah dan anak disebut...", a: ["Tes Urin", "Tes Paternitas", "Tes Darah", "Tes Alergi"], c: 1 }
                ]
            }
        ];

        let activeTab = 1;

        function renderNav() {
            const nav = document.getElementById('nav-pertemuan');
            nav.innerHTML = modules.map(m => `
                <button onclick="switchTab(${m.id})" class="tab-btn px-4 py-2 rounded-xl text-[10px] font-black tracking-widest transition-all whitespace-nowrap ${activeTab === m.id ? 'active shadow-lg' : 'text-emerald-200 hover:bg-white/10'}">
                    PERTEMUAN ${m.id}
                </button>
            `).join('');
        }

        function switchTab(id) {
            activeTab = id;
            renderNav();
            const m = modules.find(x => x.id === id);
            if (!m) return;
            const area = document.getElementById('content-area');
            
            area.innerHTML = `
                <div class="animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <!-- Judul Section -->
                    <div class="text-center mb-12">
                        <span class="inline-block px-4 py-1.5 bg-emerald-100 text-emerald-800 text-[10px] font-black rounded-full mb-4 uppercase tracking-[0.3em] border border-emerald-200">
                            MODUL ${m.category}
                        </span>
                        <h1 class="text-4xl lg:text-5xl font-black text-slate-900 mb-2">Pertemuan 0${m.id}</h1>
                        <p class="text-slate-500 font-bold text-lg">${m.title}</p>
                    </div>

                    <!-- RMP Box (Inspirasi IPA-105) -->
                    <div class="bg-white border-l-8 border-amber-500 shadow-xl p-8 rounded-2xl mb-12">
                        <h3 class="text-xs font-black text-emerald-800 uppercase mb-6 tracking-[0.2em] flex items-center gap-2">
                            <i class="fas fa-clipboard-check"></i> Rencana Materi Pembelajaran (RMP)
                        </h3>
                        <div class="grid md:grid-cols-3 gap-8 text-xs text-slate-600">
                            <div class="bg-slate-50 p-4 rounded-xl">
                                <span class="font-black text-slate-900 block mb-2 text-[10px]">KOMPETENSI DASAR</span>
                                ${m.rmp.kd}
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl">
                                <span class="font-black text-slate-900 block mb-2 text-[10px]">TUJUAN PEMBELAJARAN</span>
                                ${m.rmp.tujuan}
                            </div>
                            <div class="bg-slate-50 p-4 rounded-xl">
                                <span class="font-black text-slate-900 block mb-2 text-[10px]">INDIKATOR CAPAIAN</span>
                                ${m.rmp.indikator}
                            </div>
                        </div>
                    </div>

                    <!-- Galeri Gambar -->
                    <div class="grid md:grid-cols-2 gap-6 mb-12">
                        ${m.images.map(img => `
                            <div class="img-card group overflow-hidden rounded-[2.5rem] shadow-xl relative h-64 border-4 border-white bg-slate-200">
                                <img src="${img.url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt="${img.cap}">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent flex items-end p-6">
                                    <p class="text-white text-xs font-bold italic opacity-90">${img.cap}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Materi (6 Paragraf) -->
                    <div class="prose max-w-none text-slate-700 mb-20 bg-white p-10 lg:p-14 rounded-[3rem] shadow-sm border border-slate-100">
                        ${m.content}
                    </div>

                    <!-- Kuis Interaktif -->
                    <div class="bg-emerald-900 p-12 lg:p-16 rounded-[4rem] shadow-2xl text-white">
                        <div class="flex items-center justify-between mb-12 border-b border-white/10 pb-8">
                            <div>
                                <h2 class="text-3xl font-black mb-1">Uji Kompetensi 0${m.id}</h2>
                                <p class="text-emerald-300 text-xs font-bold uppercase tracking-widest">Verifikasi Pemahaman</p>
                            </div>
                            <div class="w-16 h-16 bg-white/10 rounded-3xl flex items-center justify-center backdrop-blur-md">
                                <i class="fas fa-tasks text-amber-400 text-2xl"></i>
                            </div>
                        </div>
                        <div class="space-y-8">
                            ${m.questions.map((q, i) => `
                                <div class="bg-white/5 p-8 rounded-[2rem] border border-white/10">
                                    <p class="font-bold text-white mb-6 text-lg">${i+1}. ${q.q}</p>
                                    <div class="grid md:grid-cols-2 gap-4">
                                        ${q.a.map((ans, aIdx) => `
                                            <button onclick="checkAns(${m.id}, ${i}, ${aIdx}, this)" class="text-left p-5 rounded-2xl border border-white/10 bg-emerald-950/30 hover:bg-white hover:text-emerald-900 transition-all text-sm font-bold flex items-center gap-4 group">
                                                <span class="w-8 h-8 flex-shrink-0 bg-white/10 group-hover:bg-emerald-100 rounded-xl text-[10px] font-black flex items-center justify-center transition-colors">
                                                    ${String.fromCharCode(65+aIdx)}
                                                </span>
                                                ${ans}
                                            </button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
            if (window.MathJax) MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function checkAns(mId, qIdx, aIdx, btn) {
            const m = modules.find(x => x.id === mId);
            const correct = m.questions[qIdx].c;
            const parent = btn.parentElement;
            const buttons = parent.querySelectorAll('button');
            
            buttons.forEach(b => b.disabled = true);
            
            if (aIdx === correct) {
                btn.classList.add('bg-amber-400', 'text-emerald-900', 'border-amber-500', 'scale-[1.02]');
                btn.querySelector('span').classList.replace('bg-white/10', 'bg-emerald-200');
            } else {
                btn.classList.add('bg-rose-500', 'text-white', 'border-rose-600');
                buttons[correct].classList.add('bg-emerald-100', 'text-emerald-900', 'border-emerald-200');
            }
        }

        function renderFinal() {
            activeTab = 0;
            renderNav();
            const area = document.getElementById('content-area');
            area.innerHTML = `
                <div class="text-center py-20 bg-white rounded-[4rem] shadow-xl border border-slate-100 animate-in zoom-in-95 duration-500">
                    <div class="w-24 h-24 bg-amber-100 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 shadow-inner">
                        <i class="fas fa-award text-5xl text-amber-600"></i>
                    </div>
                    <h2 class="text-4xl font-black text-slate-900 mb-4">Evaluasi Akhir Modul</h2>
                    <p class="text-slate-500 max-w-md mx-auto mb-10 font-medium">Sistem sedang menyiapkan ujian komprehensif dari seluruh materi pertemuan 1-8. Klik tombol di bawah untuk memulai.</p>
                    <button onclick="alert('Fitur Ujian Akhir Terintegrasi IPA-105 sedang dimuat...')" class="bg-emerald-900 text-white px-12 py-5 rounded-full font-black text-lg shadow-2xl hover:bg-black transition-all active:scale-95">
                        MULAI UJIAN SEKARANG
                    </button>
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            renderNav();
            switchTab(1);
        }
    </script>
</body>
</html>
